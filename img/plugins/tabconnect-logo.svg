<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">TabConnect icon template</title>
  <desc id="desc">A stylized browser tab with a bright connection path, used as the TabConnect extension icon.</desc>
  <defs>
    <linearGradient id="bg" x1="44" y1="28" x2="468" y2="492" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a1a2d"/>
      <stop offset="0.56" stop-color="#081321"/>
      <stop offset="1" stop-color="#03080f"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(124 120) rotate(42) scale(196 172)">
      <stop offset="0" stop-color="#52d4ff" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#52d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowWarm" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(406 404) rotate(24) scale(180 160)">
      <stop offset="0" stop-color="#ff9a6a" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ff9a6a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardBack" x1="144" y1="122" x2="404" y2="338" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1c4d73"/>
      <stop offset="1" stop-color="#102a45"/>
    </linearGradient>
    <linearGradient id="cardFront" x1="100" y1="92" x2="384" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#143b5d"/>
      <stop offset="1" stop-color="#0b2239"/>
    </linearGradient>
    <linearGradient id="signal" x1="170" y1="290" x2="346" y2="164" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4fd4ff"/>
      <stop offset="0.52" stop-color="#79e2ff"/>
      <stop offset="1" stop-color="#00f1b2"/>
    </linearGradient>
    <filter id="softGlow" x="114" y="118" width="292" height="218" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="signalGlow" x="126" y="124" width="266" height="212" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="136" fill="url(#bg)"/>
  <circle cx="124" cy="120" r="190" fill="url(#glowCyan)"/>
  <circle cx="406" cy="404" r="178" fill="url(#glowWarm)"/>

  <g opacity="0.84" transform="translate(40 36)">
    <rect x="142" y="146" width="244" height="176" rx="46" fill="url(#cardBack)" stroke="#92dcff" stroke-opacity="0.18" stroke-width="4"/>
    <rect x="184" y="116" width="104" height="40" rx="20" fill="#1a4a72" stroke="#92dcff" stroke-opacity="0.16" stroke-width="4"/>
  </g>

  <g filter="url(#softGlow)" opacity="0.34">
    <path d="M174 284C214 238 250 214 344 172" stroke="url(#signal)" stroke-width="44" stroke-linecap="round" fill="none"/>
  </g>

  <rect x="98" y="116" width="282" height="212" rx="54" fill="url(#cardFront)" stroke="#a7ecff" stroke-opacity="0.24" stroke-width="4"/>
  <rect x="138" y="86" width="126" height="48" rx="22" fill="#173f62" stroke="#a7ecff" stroke-opacity="0.22" stroke-width="4"/>
  <path d="M148 170H326" stroke="#7fd9ff" stroke-opacity="0.2" stroke-width="10" stroke-linecap="round"/>

  <path d="M174 284C214 238 250 214 344 172" stroke="url(#signal)" stroke-width="30" stroke-linecap="round" fill="none"/>
  <path d="M174 284C214 238 250 214 344 172" stroke="url(#signal)" stroke-width="30" stroke-linecap="round" fill="none" filter="url(#signalGlow)" opacity="0.42"/>

  <circle cx="174" cy="284" r="34" fill="#0d2238" stroke="#79e2ff" stroke-width="10"/>
  <circle cx="174" cy="284" r="12" fill="#00f1b2"/>

  <circle cx="344" cy="172" r="30" fill="#0d2238" stroke="#00f1b2" stroke-width="10"/>
  <circle cx="344" cy="172" r="10" fill="#79e2ff"/>

  <circle cx="250" cy="218" r="14" fill="#ff9a6a" opacity="0.94"/>
  <path d="M288 252H334" stroke="#ff9a6a" stroke-width="14" stroke-linecap="round"/>
  <path d="M334 252l22-24" stroke="#ff9a6a" stroke-width="14" stroke-linecap="round"/>
</svg>